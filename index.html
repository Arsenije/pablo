<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>links</title>
  <link rel="alternate" type="application/rss+xml" title="pablo links" href="https://links-worker.arsenije-catic-cloudflare.workers.dev/feed">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f8f7f4;
      --surface: #ffffff;
      --border:  #e8e5df;
      --text:    #1a1916;
      --muted:   #8a8680;
      --accent:  #4a4642;
      --chip-a:  #e8e4de;
      --chip-b:  #dde8e4;
      --radius:  10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      padding: 2.5rem 1.5rem 1rem;
      max-width: 680px;
      margin: 0 auto;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: lowercase;
    }

    #search {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      font-size: 0.875rem;
      color: var(--text);
      padding: 0.5rem 0;
      outline: none;
      margin-top: 0.75rem;
    }

    #search::placeholder { color: var(--muted); }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr auto;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
      margin-bottom: 0.625rem;
    }

    .card:hover { border-color: var(--accent); }

    .card-body {
      padding: 1rem 1.25rem;
      min-width: 0;
    }

    .card-title {
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.625rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-domain {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.625rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 0.6875rem;
      padding: 0.1875rem 0.5rem;
      border-radius: 999px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .chip-arsenije { background: var(--chip-a); color: var(--accent); }
    .chip-other    { background: var(--chip-b); color: #3a5a54; }

    .card-time {
      font-size: 0.6875rem;
      color: var(--muted);
    }

    .card-image {
      width: 88px;
      flex-shrink: 0;
      background: var(--border);
      object-fit: cover;
      display: block;
    }

    .card-image-placeholder {
      width: 88px;
      flex-shrink: 0;
      background: var(--border);
    }

    footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
      color: var(--muted);
      font-size: 0.75rem;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--accent); }

    #status { color: var(--muted); }

    .state-empty, .state-error {
      padding: 3rem 0;
      color: var(--muted);
      font-size: 0.875rem;
    }

    @media (max-width: 480px) {
      .card-image, .card-image-placeholder { width: 72px; }
    }
  </style>
</head>
<body>

<header>
  <h1>links</h1>
  <input id="search" type="search" placeholder="search" autocomplete="off" spellcheck="false">
</header>

<main id="feed">
  <p class="state-empty">Loading…</p>
</main>

<footer>
  <span id="status"></span>
</footer>

<script>
  const LINKS_FILE = 'links.md';
  const RSS_URL    = 'https://links-worker.arsenije-catic-cloudflare.workers.dev/feed';

  let allEntries = [];

  async function load() {
    const feed   = document.getElementById('feed');
    const status = document.getElementById('status');

    try {
      const res = await fetch(LINKS_FILE + '?t=' + Date.now());
      if (!res.ok) throw new Error(res.status);
      const text = await res.text();
      allEntries = parse(text);
      render(allEntries);
    } catch (e) {
      feed.innerHTML = '<p class="state-error">Could not load links.md — make sure it exists in the same folder.</p>';
      console.error(e);
    }
  }

  function render(entries) {
    const feed   = document.getElementById('feed');
    const status = document.getElementById('status');
    const query  = document.getElementById('search').value.trim();
    const total  = allEntries.length;

    if (entries.length === 0) {
      feed.innerHTML = query
        ? '<p class="state-empty">No results.</p>'
        : '<p class="state-empty">No links yet.</p>';
    } else {
      feed.innerHTML = entries.map(renderCard).join('');
    }

    const countLabel = query
      ? `${entries.length} of ${total} link${total === 1 ? '' : 's'}`
      : `${total} link${total === 1 ? '' : 's'}`;

    status.innerHTML = `${countLabel} · <a href="${RSS_URL}">rss</a>`;
  }

  function parse(text) {
    const entries = [];
    const blocks  = text.split(/^## /m).filter(b => b.trim());

    for (const block of blocks) {
      const lines = block.split('\n');
      const title = lines[0].trim();
      const entry = { title };

      for (const line of lines.slice(1)) {
        const m = line.match(/^- (\w+): (.*)$/);
        if (m) entry[m[1]] = m[2].trim();
      }

      if (entry.url) entries.push(entry);
    }

    return entries;
  }

  function filterEntries(query) {
    if (!query) return allEntries;
    const q = query.toLowerCase();
    return allEntries.filter(e => {
      const domain = (() => {
        try { return new URL(e.url).hostname.replace(/^www\./, ''); } catch { return ''; }
      })();
      return (
        (e.title       && e.title.toLowerCase().includes(q))       ||
        (e.description && e.description.toLowerCase().includes(q)) ||
        (e.author      && e.author.toLowerCase().includes(q))      ||
        domain.includes(q)
      );
    });
  }

  function renderCard(e) {
    const domain = (() => {
      try { return new URL(e.url).hostname.replace(/^www\./, ''); } catch { return ''; }
    })();

    const timeStr = (() => {
      if (!e.date) return '';
      const d = new Date(e.date);
      if (isNaN(d)) return '';
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    })();

    const authorClass = e.author === 'arsenije' ? 'chip-arsenije' : 'chip-other';
    const img = e.image
      ? `<img class="card-image" src="${esc(e.image)}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-image-placeholder"></div>`;

    return `
      <a class="card" href="${esc(e.url)}" target="_blank" rel="noopener noreferrer">
        <div class="card-body">
          <div class="card-title">${esc(e.title)}</div>
          ${e.description ? `<div class="card-desc">${esc(e.description)}</div>` : ''}
          ${domain ? `<div class="card-domain">${esc(domain)}</div>` : ''}
          <div class="card-meta">
            ${e.author ? `<span class="chip ${authorClass}">${esc(e.author)}</span>` : ''}
            ${timeStr ? `<span class="card-time">${timeStr}</span>` : ''}
          </div>
        </div>
        ${img}
      </a>`;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Search
  document.getElementById('search').addEventListener('input', function () {
    render(filterEntries(this.value.trim()));
  });

  document.getElementById('search').addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      this.value = '';
      render(allEntries);
    }
  });

  load();
</script>
</body>
</html>
